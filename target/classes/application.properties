# ── Google Gemini via OpenAI-compatible API (generation) ─────────────────────
spring.ai.openai.api-key=${GOOGLE_API_KEY}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.chat.options.model=gemini-2.5-flash-lite

# ── RAG tuning (free Voyage tier: 3 RPM / 10K TPM) ──────────────────────────
##rag.top-k=3
rag.chunk-overlap=10
# 8 chunks x 512 tokens = 4096 tokens/request — safely under 10K TPM
rag.embedding-batch-size=8
# 21 s gap between batches keeps us under 3 RPM (1 req / 20 s)
rag.embedding-request-delay-ms=21000
# Set to 0 — return all chunks, let Gemini filter by relevance
# Short questions score low against long structured doc chunks even when semantically relevant
rag.min-similarity=0.3

# ── PGVector store ────────────────────────────────────────────────────────────
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.index-type=HNSW

# ── PostgreSQL datasource ─────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
