# ── OpenAI (chat + embeddings) ────────────────────────────────────────────────
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-3-small

# ── RAG tuning ────────────────────────────────────────────────────────────────
rag.chunk-overlap=50
rag.embedding-batch-size=32
rag.embedding-request-delay-ms=0
rag.min-similarity=0.3

# ── PGVector store ────────────────────────────────────────────────────────────
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=1536
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.index-type=HNSW

# ── File upload limits ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── PostgreSQL datasource ─────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ragdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rag}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rag}

# ── Web crawl ─────────────────────────────────────────────────────────────────
rag.crawl-max-pages=50
rag.crawl-connect-timeout-ms=10000

# ── Video transcription ───────────────────────────────────────────────────────
spring.ai.openai.audio.transcription.options.model=whisper-1
rag.max-video-size-bytes=5242880
